name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install CLI dependencies
        working-directory: packages/cli
        run: npm install

      - name: TypeScript check
        working-directory: packages/cli
        run: npx tsc --noEmit

      - name: Build
        working-directory: packages/cli
        run: npm run build

      - name: Run tests
        working-directory: packages/cli
        run: npx vitest run

      - name: Verify CLI runs
        working-directory: packages/cli
        run: |
          node dist/cli.js --version
          echo "✅ CLI version: $(node dist/cli.js --version)"

      - name: Validate structure
        run: |
          test -f packages/cli/src/cli.ts
          test -f packages/sdk/src/index.ts
          test -f packages/mcp-server/src/index.ts
          test -f packages/desktop/src/main.js
          test -f .claude/skills/open-skill/SKILL.md
          MODULES=$(ls packages/cli/src/core/*.ts | wc -l)
          test $MODULES -ge 18
          COMMANDS=$(grep -c '\.command(' packages/cli/src/cli.ts)
          test $COMMANDS -ge 58
          echo "✅ Structure: $MODULES modules, $COMMANDS commands"
