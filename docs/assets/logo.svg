<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- OpenSkill Shield shape -->
  <path d="M256 80 L400 140 L400 280 Q400 380 256 432 Q112 380 112 280 L112 140 Z"
        fill="url(#shield)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Inner diamond/data node -->
  <path d="M256 160 L320 230 L256 300 L192 230 Z"
        fill="url(#inner)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

  <!-- Connection lines (representing cross-platform sync) -->
  <line x1="256" y1="160" x2="256" y2="120" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="320" y1="230" x2="370" y2="230" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="192" y1="230" x2="142" y2="230" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="300" x2="256" y2="350" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Connection dots (platforms) -->
  <circle cx="256" cy="114" r="8" fill="white" opacity="0.9"/>
  <circle cx="376" cy="230" r="8" fill="white" opacity="0.9"/>
  <circle cx="136" cy="230" r="8" fill="white" opacity="0.9"/>
  <circle cx="256" cy="356" r="8" fill="white" opacity="0.9"/>

  <!-- Center icon: key symbol -->
  <path d="M244 218 L244 242 L252 242 L252 235 L258 235 L258 242 L268 242 L268 218"
        fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="256" cy="212" r="12" fill="none" stroke="white" stroke-width="3"/>

  <!-- Bottom text -->
  <text x="256" y="404" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="28" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="3">
    OPENSKILL
  </text>
</svg>
